name: CI

on:
	push:
		branches: [main]
	pull_request:
		branches: [main]

# Avoid running duplicate jobs on PRs from the same repo's branches.
concurrency:
	group: ci-${{ github.ref }}
	cancel-in-progress: true

jobs:
	quality:
		name: Check (type + lint + format + build)
		runs-on: ubuntu-latest
		timeout-minutes: 10

		steps:
			- uses: actions/checkout@v4

			- name: Setup Bun
				uses: oven-sh/setup-bun@v2
				with:
					bun-version: latest

			- name: Install dependencies
				run: bun install --frozen-lockfile

			- name: Sync SvelteKit
				run: bunx svelte-kit sync

			# Type check (catches TypeScript + Svelte errors).
			- name: svelte-check
				run: bunx svelte-check --tsconfig ./tsconfig.json

			# Lint (Biome check, no --write — must pass as-is).
			- name: Lint
				run: bun run lint:check

			# Verify the formatter agrees with the committed source.
			- name: Format check
				run: bunx @biomejs/biome format src/ scripts/

			# Unit tests. The github cache module has the most subtle
			# code in the project (race conditions, SWR, cooldown
			# dedup) and the tests document the expected behavior so
			# future refactors don't break it silently.
			- name: Test
				run: bun run test:run

			# Catch vulnerable dependencies before they're deployed.
			- name: Security audit
				run: bun audit
				continue-on-error: false

			# Full build exercises the image pipeline, prerender, and
			# adapter. Catches broken imports and SSR-only references.
			- name: Build
				run: bun run build
				env:
					# Use a stub for the contact API during build so
					# optimize:images and prerender don't try to reach
					# the dev intranet.
					PUBLIC_API_URL: http://localhost:3000
